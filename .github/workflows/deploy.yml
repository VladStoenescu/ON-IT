name: CI / Deploy to DigitalOcean App Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Install & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify server starts
        run: |
          # PORT is not set here, so the server uses its default (3000).
          # In App Platform, PORT is injected via http_port in .do/app.yaml.
          node server.js &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server health check passed."
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Server did not respond in time."
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  deploy:
    name: Trigger App Platform Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Check for App Platform credentials
        id: check_creds
        run: |
          if [ -n "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" ] && [ -n "${{ secrets.DIGITALOCEAN_APP_ID }}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "DIGITALOCEAN_ACCESS_TOKEN or DIGITALOCEAN_APP_ID secret not set."
            echo "App Platform will still auto-deploy because deploy_on_push is enabled in .do/app.yaml."
          fi

      - name: Install doctl
        if: steps.check_creds.outputs.has_creds == 'true'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Wait for App Platform deployment
        if: steps.check_creds.outputs.has_creds == 'true'
        run: |
          APP_ID="${{ secrets.DIGITALOCEAN_APP_ID }}"
          echo "Waiting for App Platform deployment to complete for app $APP_ID..."
          for i in $(seq 1 20); do
            PHASE=$(doctl apps list-deployments "$APP_ID" --format Phase --no-header | head -1)
            echo "Deployment phase: $PHASE (attempt $i)"
            case "$PHASE" in
              ACTIVE)
                echo "Deployment succeeded."
                exit 0
                ;;
              ERROR|CANCELED|SUPERSEDED)
                echo "Deployment ended with status: $PHASE"
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for deployment to complete."
          exit 1
