name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate SSH key secret
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not configured."
            echo "::error::Generate a key pair and add the private key as a repository secret:"
            echo "::error::  ssh-keygen -t ed25519 -C 'github-actions-deploy' -f deploy_key"
            echo "::error::Then add the contents of deploy_key to the SSH_PRIVATE_KEY repository secret."
            exit 1
          fi
          if ! printf '%s' "$SSH_PRIVATE_KEY" | grep -q 'PRIVATE KEY'; then
            echo "::error::SSH_PRIVATE_KEY does not appear to contain a valid PEM-encoded private key."
            echo "::error::The key should start with '-----BEGIN OPENSSH PRIVATE KEY-----' or '-----BEGIN RSA PRIVATE KEY-----'."
            echo "::error::Make sure you stored the private key (not the public key) in the secret."
            exit 1
          fi
          echo "SSH key validation passed."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 134.122.80.196
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR="/opt/on-it"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # Clone repo on first deploy if directory doesn't exist
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Save current commit for potential rollback
            PREV_COMMIT=$(git rev-parse HEAD)

            # Pull latest changes from main
            git fetch origin main
            git reset --hard origin/main

            # Install/update dependencies from lockfile for reproducibility
            npm ci --omit=dev

            # Ensure data and logs directories exist
            mkdir -p data logs

            # Enable PM2 to start on server reboot (idempotent)
            env PATH="$PATH:/usr/bin" pm2 startup systemd -u root --hp /root 2>/dev/null || true

            # Restart / start the app via the PM2 ecosystem file
            if pm2 describe on-it > /dev/null 2>&1; then
              pm2 reload ecosystem.config.js --env production
            else
              pm2 start ecosystem.config.js --env production
            fi
            pm2 save

            # Wait for the server to become ready and verify via HTTP health check
            echo "Waiting for application to become healthy..."
            PORT=3000
            HEALTHY=0
            for i in $(seq 1 10); do
              if curl -sf http://localhost:${PORT}/health > /dev/null; then
                echo "Health check passed on attempt $i."
                HEALTHY=1
                break
              fi
              sleep 3
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Health check failed after 10 attempts — rolling back to $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              npm ci --omit=dev
              pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
              pm2 save
              exit 1
            fi

            echo "Deployment successful"
