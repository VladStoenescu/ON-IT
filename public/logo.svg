<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60" role="img" aria-label="ON-POINT Connect logo">
  <title>ON-POINT Connect</title>
  <!-- Connection nodes and link icon -->
  <circle cx="18" cy="30" r="8" fill="#0091A4"/>
  <circle cx="42" cy="30" r="8" fill="#354D4F"/>
  <line x1="26" y1="30" x2="34" y2="30" stroke="#0091A4" stroke-width="3"/>
  <circle cx="18" cy="30" r="3" fill="#ffffff"/>
  <circle cx="42" cy="30" r="3" fill="#ffffff"/>
  <!-- ON-POINT text -->
  <text x="58" y="22" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#0091A4" letter-spacing="1">ON-POINT</text>
  <!-- Connect text -->
  <text x="58" y="44" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#354D4F" letter-spacing="2">CONNECT</text>
</svg>