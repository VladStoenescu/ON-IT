<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ON-IT Innovation Ideas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 ON-IT Innovation Ideas</h1>
            <p class="subtitle">Submit your innovative ideas to help us improve and grow</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="showTab('submit', event)">Submit Idea</button>
            <button class="tab-button" onclick="showTab('view', event)">View Ideas</button>
        </div>

        <!-- Submit Idea Tab -->
        <div id="submit-tab" class="tab-content active">
            <form id="idea-form">
                <div class="form-group">
                    <label for="title">Idea Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter a concise title for your idea">
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" required placeholder="Describe your innovation idea in detail"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="Internal">Internal</option>
                            <option value="External">External</option>
                            <option value="Process">Process</option>
                            <option value="Technology">Technology</option>
                            <option value="Customer Experience">Customer Experience</option>
                            <option value="Product">Product</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" name="type" required>
                            <option value="">Select a type</option>
                            <option value="Cost Reduction">Cost Reduction</option>
                            <option value="Revenue Growth">Revenue Growth</option>
                            <option value="Efficiency Improvement">Efficiency Improvement</option>
                            <option value="Quality Enhancement">Quality Enhancement</option>
                            <option value="New Initiative">New Initiative</option>
                            <option value="Risk Mitigation">Risk Mitigation</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="submittedBy">Your Name (Optional)</label>
                    <input type="text" id="submittedBy" name="submittedBy" placeholder="Enter your name or leave blank for anonymous">
                </div>

                <button type="submit" class="submit-button">Submit Innovation Idea</button>
            </form>

            <div id="success-message" class="message success hidden">
                ✓ Your idea has been submitted successfully!
            </div>
            <div id="error-message" class="message error hidden"></div>
        </div>

        <!-- View Ideas Tab -->
        <div id="view-tab" class="tab-content">
            <div class="filter-bar">
                <select id="filter-category" onchange="filterIdeas()">
                    <option value="">All Categories</option>
                    <option value="Internal">Internal</option>
                    <option value="External">External</option>
                    <option value="Process">Process</option>
                    <option value="Technology">Technology</option>
                    <option value="Customer Experience">Customer Experience</option>
                    <option value="Product">Product</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-type" onchange="filterIdeas()">
                    <option value="">All Types</option>
                    <option value="Cost Reduction">Cost Reduction</option>
                    <option value="Revenue Growth">Revenue Growth</option>
                    <option value="Efficiency Improvement">Efficiency Improvement</option>
                    <option value="Quality Enhancement">Quality Enhancement</option>
                    <option value="New Initiative">New Initiative</option>
                    <option value="Risk Mitigation">Risk Mitigation</option>
                </select>
            </div>
            <div id="ideas-list" class="ideas-list">
                <p class="loading">Loading ideas...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
