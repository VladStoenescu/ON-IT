name: on-it
services:
  - name: on-it
    github:
      repo: VladStoenescu/ON-IT
      branch: main
      deploy_on_push: true
    build_command: npm ci --omit=dev
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATA_DIR
        scope: RUN_TIME
        value: /data
    storage:
      - name: on-it-data
        mount_path: /data
